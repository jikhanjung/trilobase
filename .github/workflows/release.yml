name: Release
on:
  push:
    tags: ['v*.*.*']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Clone scoda-engine
        uses: actions/checkout@v4
        with:
          repository: jikhanjung/scoda-engine
          path: scoda-engine
      - name: Install dependencies
        run: |
          pip install -e "./scoda-engine/core"
          pip install -e "./scoda-engine[dev]"
      - name: Run tests (gate)
        run: pytest tests/ -v
      - name: Build .scoda packages
        run: |
          mkdir -p dist
          python scripts/create_paleocore_scoda.py
          python scripts/create_scoda.py
      - name: Build assertion DB
        run: python scripts/create_assertion_db.py
      - name: Detect built filenames
        id: files
        run: |
          echo "TRILOBASE=$(basename dist/trilobase-*.scoda)" >> $GITHUB_OUTPUT
          echo "PALEOCORE=$(basename dist/paleocore-*.scoda)" >> $GITHUB_OUTPUT
          echo "ASSERTION=$(basename dist/assertion_test/trilobase_assertion-*.db)" >> $GITHUB_OUTPUT
      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Trilobase v${{ steps.version.outputs.VERSION }}"
          body: |
            ## Trilobase v${{ steps.version.outputs.VERSION }}

            See [CHANGELOG.md](CHANGELOG.md) for details.

            ### Artifacts
            - `${{ steps.files.outputs.TRILOBASE }}` — Trilobase SCODA package
            - `${{ steps.files.outputs.PALEOCORE }}` — PaleoCore dependency package
            - `${{ steps.files.outputs.ASSERTION }}` — Assertion-centric test DB
          files: |
            dist/trilobase-*.scoda
            dist/paleocore-*.scoda
            dist/*.manifest.json
            dist/assertion_test/trilobase_assertion-*.db
            dist/assertion_test/*.manifest.json
          draft: false
          prerelease: false
