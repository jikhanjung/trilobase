name: Release
on:
  push:
    tags: ['v*.*.*']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Clone scoda-engine
        uses: actions/checkout@v4
        with:
          repository: jikhanjung/scoda-engine
          path: scoda-engine
      - name: Install dependencies
        run: pip install -e "./scoda-engine[dev]"
      - name: Run tests (gate)
        run: pytest tests/ -v
      - name: Build .scoda packages
        run: |
          mkdir -p dist
          python scripts/create_paleocore_scoda.py
          python scripts/create_scoda.py
      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Trilobase v${{ steps.version.outputs.VERSION }}"
          body: |
            ## Trilobase v${{ steps.version.outputs.VERSION }}

            See [CHANGELOG.md](CHANGELOG.md) for details.

            ### Artifacts
            - `trilobase.scoda` — Trilobase SCODA package
            - `paleocore.scoda` — PaleoCore dependency package
          files: |
            dist/trilobase.scoda
            dist/paleocore.scoda
          draft: false
          prerelease: false
