name: Release
on:
  push:
    tags: ['v*.*.*']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Clone scoda-engine
        uses: actions/checkout@v4
        with:
          repository: jikhanjung/scoda-engine
          path: scoda-engine
      - name: Install dependencies
        run: |
          pip install -e "./scoda-engine/core"
          pip install -e "./scoda-engine[dev]"
      - name: Run tests (gate)
        run: pytest tests/ -v
      - name: Build all .scoda packages
        run: |
          mkdir -p dist
          python scripts/build_paleocore_scoda.py
          python scripts/build_trilobase_scoda.py
          python scripts/build_brachiobase_scoda.py
          python scripts/build_graptobase_scoda.py
          python scripts/build_chelicerobase_scoda.py
          python scripts/build_ostracobase_scoda.py
      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "SCODA Packages v${{ steps.version.outputs.VERSION }}"
          body: |
            ## SCODA Packages v${{ steps.version.outputs.VERSION }}

            See [CHANGELOG.md](CHANGELOG.md) for details.

            ### Packages
            - Trilobase — trilobite taxonomy (Jell & Adrain 2002)
            - Brachiobase — brachiopod taxonomy (Treatise 1965 & 2000-2006)
            - Graptobase — graptolite taxonomy (Treatise 1955/1970/2023)
            - Chelicerobase — chelicerate taxonomy (Treatise 1955)
            - Ostracobase — ostracod taxonomy (Treatise 1961)
            - PaleoCore — shared reference data
          files: |
            dist/*.scoda
            dist/*.manifest.json
          draft: false
          prerelease: false
