name: Manual Release

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Version tag (e.g., v0.2.3, v0.3.0-beta.1)'
        required: true
        type: string
      prerelease:
        description: 'Is this a pre-release?'
        required: true
        type: boolean
        default: false
      release_notes:
        description: 'Release notes (optional)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Clone scoda-engine
        uses: actions/checkout@v4
        with:
          repository: jikhanjung/scoda-engine
          path: scoda-engine
      - name: Install dependencies
        run: |
          pip install -e "./scoda-engine/core"
          pip install -e "./scoda-engine[dev]"
      - name: Run tests (gate)
        run: pytest tests/ -v
      - name: Build all .scoda packages
        run: |
          mkdir -p dist
          python scripts/build_paleocore_scoda.py
          python scripts/build_trilobase_scoda.py
          python scripts/build_brachiobase_scoda.py
          python scripts/build_graptobase_scoda.py
          python scripts/build_chelicerobase_scoda.py
          python scripts/build_ostracobase_scoda.py
      - name: List built artifacts
        id: files
        run: |
          echo "### Built packages:" >> $GITHUB_STEP_SUMMARY
          for f in dist/*.scoda; do
            echo "- $(basename $f) ($(stat -c%s $f | numfmt --to=iec) bytes)" >> $GITHUB_STEP_SUMMARY
          done
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version_tag }}
          name: "SCODA Packages ${{ github.event.inputs.version_tag }}"
          body: |
            ## SCODA Packages ${{ github.event.inputs.version_tag }}

            Built from commit: ${{ github.sha }}

            ${{ github.event.inputs.release_notes }}

            ### Packages
            - Trilobase — trilobite taxonomy (Jell & Adrain 2002)
            - Brachiobase — brachiopod taxonomy (Treatise 1965 & 2000-2006)
            - Graptobase — graptolite taxonomy (Treatise 1955/1970/2023)
            - Chelicerobase — chelicerate taxonomy (Treatise 1955)
            - Ostracobase — ostracod taxonomy (Treatise 1961)
            - PaleoCore — shared reference data
          files: |
            dist/*.scoda
            dist/*.manifest.json
          draft: false
          prerelease: ${{ github.event.inputs.prerelease }}
