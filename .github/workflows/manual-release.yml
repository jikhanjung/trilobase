name: Manual Release

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Version tag (e.g., v0.2.3, v0.3.0-beta.1)'
        required: true
        type: string
      prerelease:
        description: 'Is this a pre-release?'
        required: true
        type: boolean
        default: false
      release_notes:
        description: 'Release notes (optional)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Clone scoda-engine
        uses: actions/checkout@v4
        with:
          repository: jikhanjung/scoda-engine
          path: scoda-engine
      - name: Install dependencies
        run: |
          pip install -e "./scoda-engine/core"
          pip install -e "./scoda-engine[dev]"
      - name: Run tests (gate)
        run: pytest tests/ -v
      - name: Build all .scoda packages
        run: |
          mkdir -p dist
          python scripts/build_paleocore_scoda.py
          python scripts/build_trilobita_scoda.py
          python scripts/build_brachiopoda_scoda.py
          python scripts/build_graptolithina_scoda.py
          python scripts/build_chelicerata_scoda.py
          python scripts/build_ostracoda_scoda.py
          python scripts/build_bryozoa_scoda.py
          python scripts/build_coelenterata_scoda.py
          python scripts/build_hexapoda_scoda.py
          python scripts/build_porifera_scoda.py
          python scripts/build_echinodermata_scoda.py
          python scripts/build_mollusca_scoda.py
          python scripts/build_paleobase_scoda.py
      - name: List built artifacts
        id: files
        run: |
          echo "### Built packages:" >> $GITHUB_STEP_SUMMARY
          for f in dist/*.scoda; do
            echo "- $(basename $f) ($(stat -c%s $f | numfmt --to=iec) bytes)" >> $GITHUB_STEP_SUMMARY
          done
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version_tag }}
          name: "SCODA Packages ${{ github.event.inputs.version_tag }}"
          body: |
            ## SCODA Packages ${{ github.event.inputs.version_tag }}

            Built from commit: ${{ github.sha }}

            ${{ github.event.inputs.release_notes }}

            ### Packages
            - Paleobase — meta-package (unified taxonomy tree)
            - Trilobita — trilobite taxonomy (Jell & Adrain 2002)
            - Brachiopoda — brachiopod taxonomy (Treatise 1965 & 2000-2006)
            - Graptolithina — graptolite taxonomy (Treatise 1955/1970/2023)
            - Chelicerata — chelicerate taxonomy (Treatise 1955)
            - Ostracoda — ostracod taxonomy (Treatise 1961)
            - Bryozoa — bryozoan taxonomy (Treatise 1953 & 1983)
            - Coelenterata — coelenterate taxonomy (Treatise 1956)
            - Hexapoda — hexapod taxonomy (Treatise 1992)
            - Porifera — poriferan & archaeocyathan taxonomy (Treatise 1955 & 1972-2015)
            - Echinodermata — echinoderm taxonomy (Treatise 1966-1967 & 2011)
            - Mollusca — molluscan taxonomy (Treatise 1957-1971 & 1989-1996)
            - PaleoCore — shared reference data
          files: |
            dist/*.scoda
            dist/*.manifest.json
          draft: false
          prerelease: ${{ github.event.inputs.prerelease }}
