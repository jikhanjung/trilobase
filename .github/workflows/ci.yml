name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Clone scoda-engine
        uses: actions/checkout@v4
        with:
          repository: jikhanjung/scoda-engine
          path: scoda-engine
      - name: Install dependencies
        run: |
          pip install -e "./scoda-engine/core"
          pip install -e "./scoda-engine[dev]"
          pip install pytest pytest-asyncio httpx
      - name: Run tests
        run: pytest tests/ -v
